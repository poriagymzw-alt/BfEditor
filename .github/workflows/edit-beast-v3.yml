name: Edit Beast V3

on:
  workflow_dispatch:
    inputs:
      package_url:
        description: "ZIP URL from GitHub Release. ZIP must contain anime.mp4 and music.mp3"
        required: true
        default: ""
      style:
        description: "rage_phonk / dark_phonk / velocity / cinematic / glitch_beast"
        required: false
        default: "rage_phonk"
      duration:
        description: "Edit duration in seconds"
        required: false
        default: "18"

permissions:
  contents: write
  actions: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg unzip

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy librosa soundfile tqdm requests

      - name: Download assets from release ZIP
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_URL: ${{ github.event.inputs.package_url }}
          STYLE_INPUT: ${{ github.event.inputs.style }}
          DURATION_INPUT: ${{ github.event.inputs.duration }}
        run: |
          python scripts/download_assets.py

      - name: Render edit
        run: |
          python scripts/edit_beast_v3.py

      - name: Upload artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: edit-beast-v3-output
          path: |
            output/final_edit.mp4
            output/preview.gif
            output/thumbnail.jpg
            output/caption.txt
            output/hashtags.txt
            output/edit_report.md
            output/edit_plan.json

      - name: Publish final edit to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: edit-output-${{ github.run_number }}
          name: Edit Output ${{ github.run_number }}
          body: |
            Final edit generated by Edit Beast V3.
            Style: ${{ github.event.inputs.style }}
            Duration: ${{ github.event.inputs.duration }} seconds
          files: |
            output/final_edit.mp4
            output/preview.gif
            output/thumbnail.jpg
            output/edit_report.md
